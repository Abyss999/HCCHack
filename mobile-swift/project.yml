name: DishMatch

options:
  bundleIdPrefix: com.dishmatch
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: DishMatch/Config/Debug.xcconfig
  Release: DishMatch/Config/Release.xcconfig

targets:
  DishMatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DishMatch
        excludes:
          - Config/Debug.xcconfig
          - Config/Release.xcconfig
    resources:
      - path: DishMatch/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dishmatch.app
        INFOPLIST_FILE: DishMatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Nuke
        product: Nuke
    scheme:
      testTargets: []

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
